# Prerequisites: WIF pool/provider must be created in GCP.
# See .planning/phases/04-dashboard-and-deployment/04-RESEARCH.md for setup commands.
#
# NOTE: The Cloud Build trigger in GCP Console should be disabled to avoid double-deploys.
# This GitHub Actions workflow is the canonical deploy path.

name: Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: northamerica-northeast1
  SERVICE: bryanandbryan
  REGISTRY: northamerica-northeast1-docker.pkg.dev

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --quiet -r requirements.txt
          pip install --quiet pytest

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short || true

  deploy:
    runs-on: ubuntu-latest
    needs: [test]
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.REGISTRY }}

      - name: Build and push image
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/app/${{ env.SERVICE }}:${{ github.sha }}"
          docker build -t $IMAGE .
          docker push $IMAGE
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE }}
          secrets: |
            DATABASE_URL=claimpilot-db-url:latest
            ANTHROPIC_API_KEY=anthropic-api-key:latest
            SECRET_KEY=flask-secret-key:latest
          env_vars: |
            FLASK_CONFIG=production
          flags: >-
            --min-instances=0
            --max-instances=3
            --memory=512Mi
            --cpu=1
            --port=8080
            --allow-unauthenticated
