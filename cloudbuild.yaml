steps:
  # Run tests
  - name: 'python:3.12-slim'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        pip install --quiet -r requirements.txt
        pip install --quiet pytest
        python -m pytest tests/ -v --tb=short
    id: 'test'

  # Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'northamerica-northeast1-docker.pkg.dev/$PROJECT_ID/bryanandbryan-images/app:$SHORT_SHA'
      - '-t'
      - 'northamerica-northeast1-docker.pkg.dev/$PROJECT_ID/bryanandbryan-images/app:latest'
      - '.'
    id: 'build'
    waitFor: ['test']

  # Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'northamerica-northeast1-docker.pkg.dev/$PROJECT_ID/bryanandbryan-images/app'
    id: 'push'
    waitFor: ['build']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'bryanandbryan'
      - '--image'
      - 'northamerica-northeast1-docker.pkg.dev/$PROJECT_ID/bryanandbryan-images/app:$SHORT_SHA'
      - '--region'
      - 'northamerica-northeast1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-secrets'
      - 'DATABASE_URL=claimpilot-db-url:latest,ANTHROPIC_API_KEY=anthropic-api-key:latest,FLASK_SECRET_KEY=flask-secret-key:latest'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '3'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--port'
      - '8080'
    id: 'deploy'
    waitFor: ['push']

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - 'northamerica-northeast1-docker.pkg.dev/$PROJECT_ID/bryanandbryan-images/app:$SHORT_SHA'
  - 'northamerica-northeast1-docker.pkg.dev/$PROJECT_ID/bryanandbryan-images/app:latest'
